[pytest]
addopts =
    -v
    -p no:randomly
    --tracing retain-on-failure
    --screenshot only-on-failure
    --video retain-on-failure
    --alluredir=reports
    -n auto
    --dist loadfile

testpaths = tests

markers =
    ui: UI tests that require a browser
    api: API tests that use the authenticated request context
    smoke: quick sanity tests for CI gates
    regression: full regression suite
    flaky: tests known to be flaky (auto-retried)
